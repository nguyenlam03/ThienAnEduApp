<script>
  (function (global) {
    'use strict';

    const STORAGE_KEY = 'thienAnEducation.appTheme';
    const DEFAULT_THEME = 'default';
    const VALID_THEMES = ['default', 'artistic'];

    function normalizeTheme(theme) {
      return VALID_THEMES.includes(theme) ? theme : DEFAULT_THEME;
    }

    function readStoredTheme() {
      try {
        return normalizeTheme(global.localStorage.getItem(STORAGE_KEY));
      } catch (error) {
        return DEFAULT_THEME;
      }
    }

    function writeStoredTheme(theme) {
      try {
        global.localStorage.setItem(STORAGE_KEY, theme);
      } catch (error) {
        // Trình duyệt chặn localStorage: giao diện vẫn đổi trong phiên hiện tại.
      }
    }

    function applyTheme(theme) {
      const normalizedTheme = normalizeTheme(theme);
      document.documentElement.setAttribute('data-app-theme', normalizedTheme);
      return normalizedTheme;
    }

    function setTheme(theme) {
      const normalizedTheme = applyTheme(theme);
      writeStoredTheme(normalizedTheme);

      document.querySelectorAll('[data-theme-select]').forEach(function (select) {
        if (select.value !== normalizedTheme) {
          select.value = normalizedTheme;
        }
      });

      document.dispatchEvent(new CustomEvent('app-theme-change', {
        detail: { theme: normalizedTheme }
      }));

      return normalizedTheme;
    }

    function bindSelect(select) {
      if (!select) return;
      select.setAttribute('data-theme-select', 'true');
      select.value = getTheme();
    }

    function getTheme() {
      return normalizeTheme(
        document.documentElement.getAttribute('data-app-theme') || readStoredTheme()
      );
    }

    const initialTheme = applyTheme(readStoredTheme());

    global.AppTheme = Object.freeze({
      STORAGE_KEY: STORAGE_KEY,
      DEFAULT_THEME: DEFAULT_THEME,
      THEMES: Object.freeze({
        DEFAULT: 'default',
        ARTISTIC: 'artistic'
      }),
      initialTheme: initialTheme,
      get: getTheme,
      set: setTheme,
      apply: applyTheme,
      bindSelect: bindSelect
    });
  })(window);
</script>
