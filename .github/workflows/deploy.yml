name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main # Chạy action khi có thay đổi được đẩy lên nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Authenticate Clasp
        # Tạo lại file .clasprc.json trong môi trường server của GitHub bằng Secret đã lưu
        run: |
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Push to GAS
        run: clasp push -f
